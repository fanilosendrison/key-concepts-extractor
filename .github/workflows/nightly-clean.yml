name: nightly-clean

on:
  schedule:
    - cron: '5 0 * * *'   # 00:05 UTC daily (staggered from llm-runtime)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  call:
    uses: fanilosendrison/cc-ci/.github/workflows/nightly-clean-callable.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
